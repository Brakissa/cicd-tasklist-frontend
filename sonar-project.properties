sonar.projectKey=brakissa-tasklist-frontend
sonar.projectName=brakissa-tasklist-frontend
sonar.projectVersion=1.0
# URL du serveur SonarQube
sonar.host.url=https://sonarqube.cicd.kits.ext.educentre.fr
# Sources (exclut les tests via sonar.exclusions)
sonar.sources=src
# Tests
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*.test.ts,src/**/__tests__/**/*.test.tsx
# Exclusions
sonar.exclusions=\
node_modules/**,\
dist/**,\
coverage/**,\
reports/**,\
prisma/migrations/**,\
**/*.config.ts,\
**/*.config.js,\
**/__tests__/**
# Couverture de tests (LCOV)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Encodage
sonar.sourceEncoding=UTF-8
# Exclure tests de la détection de duplication
sonar.cpd.exclusions=**/__tests__/**
